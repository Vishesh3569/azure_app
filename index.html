<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Static App Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Azure Deployment Ready</h1>
            <p>This is a static web app built with HTML, CSS, and JS.</p>
        </header>

        <main>
            <div class="card">
                <h2>Interactive Element</h2>
                <p>Click the button below to trigger client-side JavaScript.</p>
                <button id="actionBtn">Click Me</button>
                <p id="counter">Count: 0</p>
            </div>
        </main>

        <footer>
            <p>Ready for Azure Static Web Apps</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
